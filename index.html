<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- ================= ENGINE ================= -->
<script>

let cart = [];
const WPP = "593939166222";

function addToCart(name, price){

    const item = cart.find(i=>i.name===name);

    if(item) item.qty++;
    else cart.push({name, price, qty:1});

    renderCart();
    document.getElementById("cart")?.classList.add("open");
}

function renderCart(){

    const box = document.getElementById("cart-items");
    const count = document.getElementById("cart-count");
    const empty = document.getElementById("cart-empty");

    if(!box) return;

    box.innerHTML = "";
    let totalItems = 0;

    cart.forEach(i=>{
        totalItems += i.qty;
        box.innerHTML += `<div class="item">${i.name} x${i.qty}</div>`;
    });

    if(count) count.innerText = totalItems;
    if(empty) empty.style.display = cart.length ? "none" : "block";
}

function toggleCart(){
    document.getElementById("cart")?.classList.toggle("open");
}

function buyNow(name, price){

    const msg = `🛒 ORDER\n${name}\n$${price}`;

    window.open(
        `https://wa.me/${WPP}?text=${encodeURIComponent(msg)}`,
        "_blank"
    );
}

function calculateSavings(){

    const s = document.getElementById("calc-service");
    if(!s) return;

    const o = +s.options[s.selectedIndex].dataset.o;
    const c = +s.options[s.selectedIndex].dataset.c;

    const save = o - c;
    const percent = Math.round((save/o)*100);

    document.getElementById("off").innerText = "$"+o;
    document.getElementById("cli").innerText = "$"+c;
    document.getElementById("sav").innerText = "$"+save+" ("+percent+"%)";

    const bar = document.getElementById("bar");
    if(bar) bar.style.width = percent + "%";
}

// ================= TOAST LIVE =================
const cities = ["Quito","Lima","Bogotá","Santiago","México DF"];
const products = ["Netflix","Disney+","IPTV","DAZN","Paramount+"];

function toast(){

    const box = document.getElementById("toast");

    if(!box) return;

    const city = cities[Math.floor(Math.random()*cities.length)];
    const prod = products[Math.floor(Math.random()*products.length)];

    const div = document.createElement("div");
    div.className = "toast";
    div.innerText = `🟢 ${city} compró ${prod}`;

    box.appendChild(div);

    setTimeout(()=>div.remove(),4000);
}

setInterval(toast, 5000);

</script>
