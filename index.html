<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLICK TV MUNDIAL 2026 | Streaming Premium IPTV Mundial de Fútbol</title>
    <meta name="description" content="Streaming Premium: Netflix, Disney+, IPTV Ultra 4K y más. Vive el Mundial 2026 con activación inmediata y pagos locales.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="🏆 Click TV — Mundial FIFA 2026 en Vivo">
    <meta property="og:url" content="https://click-tv-mundial.vercel.app/">
    <meta property="og:image" content="https://click-tv-mundial.vercel.app/assets/img/banner.jpg">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=ASzNgRtmM63xQ0hRG9Lx47JyJKmva9nu4ij8ZsbAJRrAD1b1b0okUxnBtneq2xUmK6q9JuIHlXFR2T_-&currency=USD"></script>
</head>
<body>

<div class="top-bar glass">
    <div class="top-info">
        <span id="user-location"><i class="fas fa-globe"></i> Detectando...</span>
        <span id="user-currency"><i class="fas fa-coins"></i> USD</span>
        <span id="online-users"><i class="fas fa-users"></i> 245 activos</span>
    </div>
</div>

<header class="main-header glass">
    <a href="#" class="logo">CLICK<span>TV</span> 2026</a>
    <nav class="nav-menu" id="nav-menu">
        <a href="#inicio">Inicio</a>
        <a href="#mundial">Mundial</a>
        <a href="#streaming">Catálogo</a>
        <a href="#pagos">Pagos</a>
        <button onclick="toggleCart()" class="cart-btn-nav"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></button>
    </nav>
    <div class="menu-hamburguesa" onclick="toggleMobileMenu()">☰</div>
</header>

<section class="hero" id="inicio">
    <div class="hero-content">
        <h1>Mundial FIFA <span>2026</span></h1>
        <p>Streaming Premium y TV Digital sin fronteras.</p>
        <div class="hero-btns">
            <a href="#mundial" class="btn btn-live">🔴 PARTIDOS DE HOY</a>
            <a href="#streaming" class="btn btn-gold">VER CATÁLOGO</a>
        </div>
    </div>
</section>

<!-- Sección Mundial -->
<section id="mundial" class="section">
    <h2>🏆 Marcador en Vivo</h2>
    <div id="matches-container" class="matches-grid">
        <!-- JS Render -->
    </div>
    <a href="#" id="fifa-link" target="_blank" class="btn-fifa">Ver Calendario Oficial FIFA</a>
</section>

<!-- Catálogo -->
<section id="streaming" class="section">
    <div class="filters">
        <button onclick="filterCat('todos')">Todos</button>
        <button onclick="filterCat('streaming')">Streaming</button>
        <button onclick="filterCat('iptv')">IPTV</button>
    </div>
    <div id="catalogo-grid" class="products-grid"></div>
</section>

<!-- Carrito Lateral -->
<div id="cart-sidebar" class="cart-sidebar glass">
    <div class="cart-header">
        <h3>Tu Carrito</h3>
        <span class="close-cart" onclick="toggleCart()">×</span>
    </div>
    <div id="cart-items" class="cart-items"></div>
    
    <div class="cart-checkout-area">
        <div class="coupon-box">
            <input type="text" id="coupon-input" placeholder="Cupón">
            <button onclick="applyDiscount()">Aplicar</button>
        </div>
        <div id="cart-summary" class="cart-summary">
            <!-- Totales JS -->
        </div>
        
        <div class="payment-methods">
            <h4>Pagar con:</h4>
            <div id="paypal-button-container"></div>
            <button onclick="payWithDeuna()" class="btn-deuna">💰 Pagar con DEUNA</button>
            <button onclick="payWithPayphone()" class="btn-payphone">💳 Pagar con PayPhone</button>
            <div class="transfer-info">
                <p>Transferencia Banco Pichincha: <strong id="copy-pichincha">2205375908</strong> <i class="fas fa-copy" onclick="copyText('2205375908')"></i></p>
            </div>
        </div>
    </div>
</div>

<!-- Botones Flotantes -->
<div class="floating-container">
    <a id="btn-telegram" class="float-btn float-tg"><i class="fab fa-telegram-plane"></i></a>
    <a id="btn-whatsapp-grupo" class="float-btn float-wa-grp"><i class="fas fa-users"></i></a>
    <a id="btn-whatsapp" class="float-btn float-wa"><i class="fab fa-whatsapp"></i></a>
    <a id="btn-soporte" class="float-btn float-help"><i class="fas fa-headset"></i></a>
    <button id="btn-scroll-top" class="float-btn float-up"><i class="fas fa-chevron-up"></i></button>
</div>

<!-- Actividad Reciente -->
<div id="activity-toast" class="activity-toast glass"></div>

<script src="data.js"></script>
<script src="catalogo.js"></script>
<script src="script.js"></script>
</body>
</html>
